name: Pylint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint mcp fastmcp
          # If you have a requirements.txt, use this instead:
          # pip install pylint -r requirements.txt

      - name: Run Pylint
        run: |
          pylint $(git ls-files '*.py') --fail-under=7.0
        # --fail-under=7.0 only fails if score drops below 7/10
        # Remove it to fail on ANY pylint message
